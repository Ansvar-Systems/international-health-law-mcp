name: Drift Detection

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --ignore-scripts
      - run: npm run build

      - name: Run drift detection
        id: drift
        run: npm run check-updates || echo "drift_detected=true" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Create drift issue
        if: steps.drift.outputs.drift_detected == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Upstream drift detected — ${new Date().toISOString().split('T')[0]}`,
              body: 'Nightly drift detection found potential changes in upstream sources (WHO, ICH, IMDRF, Codex).\n\nRun `npm run check-updates` locally to see details.',
              labels: ['data-drift', 'automated']
            });
