# ═══════════════════════════════════════════════════════════════════════════
# SMITHERY CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════
#
# Configuration for the Smithery MCP registry.
# https://smithery.ai
#
# Smithery is a registry for discovering and sharing MCP servers.
# Submitting your server here helps users find it.
#
# To submit:
#   1. Push this file to your repository
#   2. Go to https://smithery.ai/submit
#   3. Enter your GitHub repository URL
#
# ═══════════════════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────────────────
# BASIC INFO
# ───────────────────────────────────────────────────────────────────────────

# Package name (should match package.json)
name: international-health-law-mcp

# Human-readable description
description: MCP server providing access to international health law and regulatory instruments (WHO, ICH, IMDRF, Codex, and related global health frameworks)

# Version (should match package.json)
version: "0.1.0"

# ───────────────────────────────────────────────────────────────────────────
# RUNTIME
# ───────────────────────────────────────────────────────────────────────────

# Runtime environment
runtime: node

# Entry point (relative to package root)
entrypoint: dist/index.js

# ───────────────────────────────────────────────────────────────────────────
# TRANSPORT
# ───────────────────────────────────────────────────────────────────────────

# Transport type (stdio for local execution)
transport:
  type: stdio

# ───────────────────────────────────────────────────────────────────────────
# METADATA
# ───────────────────────────────────────────────────────────────────────────

metadata:
  # Author information
  author: Ansvar Systems AB

  # License (should match package.json)
  license: Apache-2.0

  # Homepage URL
  homepage: https://github.com/Ansvar-Systems/international-health-law-mcp

  # Documentation URL (if different from homepage)
  documentation: https://github.com/Ansvar-Systems/international-health-law-mcp#readme

  # Tags for discovery
  tags:
    - compliance
    - legal
    - regulations
    - ansvar

  # Category
  category: legal

  # Supported languages/regions
  languages:
    - en

  # Minimum Node.js version
  node_version: ">=18"

# ───────────────────────────────────────────────────────────────────────────
# TOOLS
# ───────────────────────────────────────────────────────────────────────────
# List the tools provided by this server

tools:
  - name: search_health_regulation
    description: Search international health law and regulatory provisions across WHO, ICH, IMDRF, WMA, and Codex sources

  - name: get_provision
    description: Retrieve a specific provision by source and provision identifier

  - name: get_ich_guideline
    description: Retrieve ICH guideline entries by ID or query

  - name: get_imdrf_guidance
    description: Retrieve IMDRF N-series guidance by ID or query

  - name: check_who_status
    description: Inspect WHO-source freshness and quality status

  - name: map_to_national_requirements
    description: Map international provisions to national or regional requirement frameworks

  - name: search_medical_device_requirements
    description: Search medical-device-focused requirements across device-relevant sources

  - name: build_legal_stance
    description: Build an evidence-backed legal stance summary for a regulatory topic

  - name: list_sources
    description: List available sources and their contents

  - name: about
    description: Return server metadata and dataset coverage statistics

  - name: check_data_freshness
    description: Evaluate source freshness against warning and critical thresholds
